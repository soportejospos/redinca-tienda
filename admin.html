<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>REDINCA 2025 — Administración</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<style>
/* ... (Se mantienen todos los estilos base del CSS anterior para no alterar la visual) ... */
:root {
  --bg: #f8f9fa; --bg2: #ffffff; --surface: rgba(255,255,255,0.85); --glass: rgba(255,255,255,0.65);
  --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.05); --text: #000000; --muted: #666666;
  --accent: #e60000; --green: #28a745; --red: #dc3545; --radius: 12px; --radius3: 24px;
}
[data-theme="dark"] { --bg: #000000; --bg2: #121212; --surface: rgba(30,30,30,0.95); --text: #ffffff; --border: rgba(255,255,255,0.15); }

body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; }
.sidebar { width: 260px; background: var(--glass); backdrop-filter: blur(30px); border-right: 1px solid var(--border); position: fixed; height: 100vh; display: flex; flex-direction: column; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 15px 20px; border: none; background: none; color: var(--text); cursor: pointer; width: 100%; text-align: left; transition: 0.2s; }
.nav-item.active { background: rgba(230,0,0,0.1); color: var(--accent); border-right: 3px solid var(--accent); }
.main { margin-left: 260px; padding: 40px; }

/* Dashboard Cards */
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
.stat-card { background: var(--bg2); padding: 25px; border-radius: var(--radius); border: 1px solid var(--border); }
.stat-value { font-size: 32px; font-weight: bold; margin-top: 5px; }

/* Estilo para estado vacío (Empty State) */
.empty-state { padding: 60px; text-align: center; color: var(--muted); font-size: 15px; }

/* Imagenes en tabla y modal */
.img-preview-sm { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; background: #eee; }
.img-grid-upload { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
.img-box { aspect-ratio: 1; border: 2px dashed var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative; }
.img-box img { width: 100%; height: 100%; object-fit: cover; }

.btn-primary { background: var(--accent); color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 100; }
.modal { background: var(--bg2); padding: 30px; border-radius: var(--radius3); width: 550px; max-height: 90vh; overflow-y: auto; }
</style>
</head>
<body>

<div id="admin-app" style="display: flex;">
  <aside class="sidebar">
    <div style="padding: 30px 20px;"><h3>REDINCA 2025</h3></div>
    <nav>
      <button class="nav-item active" onclick="goTo('dashboard', this)">📊 Dashboard</button>
      <button class="nav-item" onclick="goTo('sales', this)">💰 Métricas de Ventas</button>
      <button class="nav-item" onclick="goTo('products', this)">📦 Productos</button>
      <button class="nav-item" onclick="goTo('orders', this)">📋 Órdenes</button>
    </nav>
  </aside>

  <main class="main">
    <header style="display:flex; justify-content:space-between; margin-bottom:30px;">
      <h1 id="page-title">Dashboard</h1>
    </header>

    <!-- DASHBOARD PRINCIPAL (image_4a6228.png) -->
    <div id="page-dashboard" class="page">
      <div class="stats-row" id="dash-stats">
        <!-- Stats se cargan dinámicamente -->
      </div>
      <div class="stat-card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
          <h3 style="font-size:16px;">Pedidos recientes</h3>
          <button style="border:none; background:none; color:var(--muted); cursor:pointer;" onclick="goTo('orders', null)">Ver todos →</button>
        </div>
        <div id="recent-orders-container">
          <!-- Aquí se inyecta la tabla o el mensaje de "Sin pedidos aún" -->
        </div>
      </div>
    </div>

    <!-- METRICAS DE VENTAS (Nuevo) -->
    <div id="page-sales" class="page" style="display:none;">
      <div class="stats-row">
        <div class="stat-card"><div style="color:var(--muted); font-size:12px;">Utilidad Neta</div><div class="stat-value" id="v-profit" style="color:var(--green)">Bs. 0</div></div>
        <div class="stat-card"><div style="color:var(--muted); font-size:12px;">Ingresos Brutos</div><div class="stat-value" id="v-revenue">Bs. 0</div></div>
        <div class="stat-card"><div style="color:var(--muted); font-size:12px;">Margen</div><div class="stat-value" id="v-margin">0%</div></div>
      </div>
      <div class="stat-card">
        <h3>Rentabilidad por Producto</h3>
        <table style="width:100%; margin-top:15px; border-collapse:collapse;" id="v-top-table">
          <thead><tr style="text-align:left; color:var(--muted); font-size:12px;"><th style="padding:10px;">Producto</th><th>Cant.</th><th>Ganancia</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- PRODUCTOS -->
    <div id="page-products" class="page" style="display:none;">
      <div class="stat-card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
          <h3>Gestión de Inventario</h3>
          <button class="btn-primary" style="width:auto; padding:8px 20px;" onclick="openProdModal()">+ Nuevo Producto</button>
        </div>
        <table style="width:100%; border-collapse:collapse;">
          <thead><tr style="text-align:left; color:var(--muted); font-size:12px;"><th>Img</th><th>Nombre</th><th>Costo</th><th>Precio</th><th>Margen</th><th>Acciones</th></tr></thead>
          <tbody id="prod-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- ÓRDENES -->
    <div id="page-orders" class="page" style="display:none;">
      <div id="orders-full-list"></div>
    </div>
  </main>
</div>

<!-- MODAL PRODUCTO (Restaurada la subida de imágenes) -->
<div class="overlay" id="prod-modal-ov">
  <div class="modal">
    <h2 id="modal-title">Producto</h2>
    <form id="prod-form" onsubmit="event.preventDefault(); saveProduct();" style="margin-top:20px;">
      <div style="margin-bottom:15px;">
        <label style="font-size:12px; color:var(--muted);">Nombre del Repuesto</label>
        <input type="text" id="pf-nombre" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border);" required/>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:15px;">
        <div>
          <label style="font-size:12px; color:var(--muted);">Categoría</label>
          <input type="text" id="pf-cat" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border);" required/>
        </div>
        <div>
          <label style="font-size:12px; color:var(--muted);">Precio Venta</label>
          <input type="number" step="0.01" id="pf-precio" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border);" required/>
        </div>
      </div>
      <div style="margin-bottom:15px;">
        <label style="font-size:12px; color:var(--muted);">Costo de Adquisición</label>
        <input type="number" step="0.01" id="pf-costo" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border);" required/>
      </div>
      
      <!-- SUBIDA DE IMÁGENES RESTAURADA -->
      <div style="margin-bottom:15px;">
        <label style="font-size:12px; color:var(--muted);">Imágenes del Producto</label>
        <div class="img-grid-upload" id="img-upload-container">
          <div class="img-box" onclick="triggerUpload()"><span style="font-size:24px;">+</span></div>
        </div>
        <input type="file" id="img-input" multiple hidden accept="image/*" onchange="handleImgs(this)"/>
      </div>

      <div style="display:flex; gap:10px; margin-top:25px;">
        <button type="button" class="btn-primary" style="background:#eee; color:#333;" onclick="closeModal()">Cancelar</button>
        <button type="submit" class="btn-primary">Guardar Cambios</button>
      </div>
    </form>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const sb = createClient('TU_URL', 'TU_KEY');

let products = [], orders = [], editId = null, currentImages = [];

// CARGA INICIAL
async function init() {
    const { data: p } = await sb.from('productos').select('*');
    products = p || [];
    const { data: o } = await sb.from('ordenes').select('*').order('created_at', { ascending: false });
    orders = o || [];
    
    renderDashboard();
    renderProducts();
    renderOrders();
}

// DASHBOARD CON ESTADO VACÍO (image_4a6228.png)
function renderDashboard() {
    const statsContainer = document.getElementById('dash-stats');
    statsContainer.innerHTML = `
        <div class="stat-card"><div>Productos</div><div class="stat-value">${products.length}</div></div>
        <div class="stat-card"><div>Órdenes</div><div class="stat-value">${orders.length}</div></div>
    `;

    const recentContainer = document.getElementById('recent-orders-container');
    if (orders.length === 0) {
        recentContainer.innerHTML = `<div class="empty-state">Sin pedidos aún</div>`; // Mantenida funcionalidad visual[cite: 1]
    } else {
        recentContainer.innerHTML = `
            <table style="width:100%; border-collapse:collapse;">
                ${orders.slice(0, 5).map(o => `<tr><td style="padding:12px 0; border-bottom:1px solid var(--border2);">${o.cliente_nombre}</td><td style="text-align:right;">Bs. ${o.total}</td></tr>`).join('')}
            </table>
        `;
    }
}

// GESTIÓN DE IMÁGENES (Restaurada)
window.triggerUpload = () => document.getElementById('img-input').click();

window.handleImgs = async (input) => {
    const files = Array.from(input.files);
    for (const file of files) {
        const path = `products/${Date.now()}-${file.name}`;
        const { data, error } = await sb.storage.from('imagenes').upload(path, file);
        if (!error) {
            const { data: { publicUrl } } = sb.storage.from('imagenes').getPublicUrl(path);
            currentImages.push(publicUrl);
        }
    }
    updateImgGrid();
};

function updateImgGrid() {
    const container = document.getElementById('img-upload-container');
    container.innerHTML = currentImages.map((src, index) => `
        <div class="img-box">
            <img src="${src}"/>
            <div onclick="removeImg(${index})" style="position:absolute; top:2px; right:2px; background:red; color:white; border-radius:50%; width:18px; height:18px; font-size:10px; display:flex; align-items:center; justify-content:center; cursor:pointer;">X</div>
        </div>
    `).join('') + `<div class="img-box" onclick="triggerUpload()"><span style="font-size:24px;">+</span></div>`;
}

window.removeImg = (i) => { currentImages.splice(i, 1); updateImgGrid(); };

// PRODUCTOS CON COSTO Y MARGEN
window.renderProducts = () => {
    const tbody = document.getElementById('prod-tbody');
    tbody.innerHTML = products.map(p => {
        const costo = p.costo || 0;
        const precio = p.precio || 0;
        const margen = precio - costo;
        const img = (p.imagenes && p.imagenes.length > 0) ? p.imagenes[0] : '';
        
        return `<tr>
            <td style="padding:10px;"><img src="${img}" class="img-preview-sm" onerror="this.src='https://via.placeholder.com/40'"/></td>
            <td>${p.nombre}</td>
            <td>Bs. ${costo.toFixed(2)}</td>
            <td>Bs. ${precio.toFixed(2)}</td>
            <td style="color:${margen > 0 ? 'var(--green)' : 'var(--red)'}">Bs. ${margen.toFixed(2)}</td>
            <td><button onclick="openProdModal('${p.id}')">Editar</button></td>
        </tr>`;
    }).join('');
};

window.saveProduct = async () => {
    const payload = {
        nombre: document.getElementById('pf-nombre').value,
        categoria: document.getElementById('pf-cat').value,
        precio: parseFloat(document.getElementById('pf-precio').value),
        costo: parseFloat(document.getElementById('pf-costo').value),
        imagenes: currentImages // Guardando el array de texto como en la DB
    };

    if (editId) await sb.from('productos').update(payload).eq('id', editId);
    else await sb.from('productos').insert([payload]);

    closeModal();
    init();
};

// NAVEGACIÓN Y MÉTRICAS (Igual que antes)
window.goTo = (page, btn) => {
    document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
    document.getElementById('page-' + page).style.display = 'block';
    if(btn) {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        btn.classList.add('active');
    }
    if (page === 'sales') renderSalesMetrics();
};

function renderSalesMetrics() {
    let revenue = 0, profit = 0;
    orders.forEach(o => {
        revenue += o.total;
        // Lógica de cálculo de utilidad basada en costos de productos en la orden
    });
    document.getElementById('v-revenue').textContent = `Bs. ${revenue.toFixed(2)}`;
    document.getElementById('v-profit').textContent = `Bs. ${profit.toFixed(2)}`;
}

window.openProdModal = (id) => {
    editId = id;
    if(id) {
        const p = products.find(x => x.id === id);
        document.getElementById('pf-nombre').value = p.nombre;
        document.getElementById('pf-precio').value = p.precio;
        document.getElementById('pf-costo').value = p.costo || 0;
        currentImages = p.imagenes || [];
    } else {
        document.getElementById('prod-form').reset();
        currentImages = [];
    }
    updateImgGrid();
    document.getElementById('prod-modal-ov').style.display = 'flex';
};

window.closeModal = () => document.getElementById('prod-modal-ov').style.display = 'none';

init();
</script>
</body>
</html>
